<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/styles.css">
    <!-- Font Awesome-->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="./scripts/scripts.js" defer></script>
    <title>To Do Avançado</title>
</head>
<body>
   <div class="todo-container">
        <header>
            <h1>To do Avançado</h1>
        </header>
        <form id="todo-form">
        <p>Adicione sua tarefa</p>
        <div class="form-control">
          <input type="text" id="todo-input" placeholder="O que você vai fazer?"
          />
          <button type="submit">
            <i class="fa-solid fa-plus"></i>
          </button>
        </div>
        </form>
        <form id="edit-form" class="">
            <p>Edite a sua tarefa</p>
            <div class="form-control">
                <input type="text" id="edit-input">
                <button type="submit">
                    <i class="fa-solid fa-check-double"></i>
                </button>
            </div>
            <button id="cancel-edit-btn">Cancelar</button>
        </form>
        <div id="toolbar">
            <div id="search">
                <h4>Pesquisar</h4>
                <form>
                    <input type="text" id="search-input" placeholder="Buscar">
                    <button id="erase-button">
                        <i class="fa-solid fa-delete-left"></i>
                    </button>
                </form>
            </div>
            <div id="filter">
                <h4>Filtrar</h4>
                <select id="filter-select">
                    <option value="all">Todos</option>
                    <option value="done">Feitas</option>
                    <option value="todo">A fazer</option>
                </select>
            </div>
        </div>
        <div id="todo-list">
            <h3>Estou fazendo alguma coisa</h3>
            <button id="finish-todo">
                <i class="fa-solid fa-check"></i>
            </button> 
            <button id="edit-todo">
                <i class="fa-solid fa-pen"></i>
            </button> 
            <button id="remove-todo">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
         <div id="todo-list">
            <h3>Estudar JavaScript</h3>
            <button id="finish-todo">
                <i class="fa-solid fa-check"></i>
            </button>
            <button id="edit-todo">
                <i class="fa-solid fa-pen"></i>
            </button>
            <button id="remove-todo">
                <i class="fa-solid fa-xmark"></i>
            </button>

        </div>
   </div>
</body>
</html>
